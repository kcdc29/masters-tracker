/* ═══ NAME NORMALIZATION ═══
   Critical: decompose unicode FIRST so Å→A, å→a, é→e, etc.
   Then strip all non-alpha for comparison key. */
const norm = n => n.normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/[^a-zA-Z ]/g,"").replace(/\s+/g," ").trim().toLowerCase();
const normKey = n => norm(n).replace(/ /g,"");

/* Match names flexibly: full normalized match OR last-name match.
   Handles "J.J. Spaun" vs "JJ Spaun", unicode Åberg vs Aberg, etc. */
const mn = (a, b) => {
  if (normKey(a) === normKey(b)) return true;
  const lastA = norm(a).split(" ").pop();
  const lastB = norm(b).split(" ").pop();
  return lastA === lastB;
};

  }, []);
  useEffect(() => {
    if (Object.keys(gd).length > 0) localStorage.setItem("mh2h5", JSON.stringify({ gd, lu: lastUp }));
  }, [gd, lastUp]);

  /* Auto-refresh */
  useEffect(() => {
    if (auto) { iv.current = setInterval(fetchS, 300000); return () => clearInterval(iv.current); }
    else if (iv.current) clearInterval(iv.current);
  }, [auto]);

  /* ═══ FETCH FROM DATAGOLF ═══ */
  const fetchS = useCallback(async () => {
    setLoading(true); setErr(null);
    try {
      const r = await fetch(DG_URL);
      if (!r.ok) throw new Error("HTTP " + r.status);
      const json = await r.json();
      const players = json.data || json;
      if (!Array.isArray(players) || players.length === 0) {
        setErr("No player data from DataGolf. Tournament may not be active yet.");
        setLoading(false);
        return;
      }
      const nd = {};
      players.forEach(p => {
        /* Convert "Last, First" → "First Last" */
        let name = p.player_name || "";
        if (name.includes(", ")) {
          const parts = name.split(", ");
          name = parts[1] + " " + parts[0];
        }
        const found = NAMES.find(n => mn(name, n));
        if (!found) return;

        const score = typeof p.current_score === "number" ? p.current_score : parseInt(p.current_score) || 0;
        const thru = typeof p.thru === "number" ? p.thru : parseInt(p.thru) || 0;
        const round = typeof p.round === "number" ? p.round : parseInt(p.round) || 1;
        const today = typeof p.today === "number" ? p.today : parseInt(p.today) || 0;
        const pos = (p.current_pos || "").toString();

        let st = "active";
        if (pos.toUpperCase().includes("CUT")) st = "cut";
        else if (pos.toUpperCase().includes("WD")) st = "wd";

        nd[normKey(found)] = { s: score, thru, rd: round, today, st, pos };
      });
      const matched = Object.keys(nd).length;
      if (matched >= 8) {
        /* Merge with manual data: API overrides unless manual was explicitly set */
        setGd(prev => {
          const merged = { ...prev };
          Object.keys(nd).forEach(k => { merged[k] = nd[k]; });
          return merged;
        });
        setLastUp(new Date().toISOString());
      } else {
        setErr("Matched " + matched + "/20 golfers. Tournament may not be active yet or DataGolf data is limited.");
      }
    } catch (e) {
      setErr("DataGolf fetch failed: " + e.message);
    }
    setLoading(false);
  }, []);

  /* Data accessors */
  const gg = n => gd[normKey(n)] || null;
  const gs = n => gg(n)?.s ?? null;
  const gthru = n => gg(n)?.thru ?? null;
  const ground = n => gg(n)?.rd ?? null;
  const gst = n => gg(n)?.st ?? "active";

  /* Manual entry update */
  const um = (n, f, v) => setGd(p => ({
    ...p,
    [normKey(n)]: {
      ...(p[normKey(n)] || { s: 0, thru: 0, rd: 1, today: 0, st: "active", pos: "" }),
      [f]: f === "s" ? (v === "" ? 0 : parseInt(v)) : f === "thru" ? (parseInt(v) || 0) : v
    }
  }));

  /* ═══ MATCHUP RESULT LOGIC ═══ */
  const mres = i => {
    const m = MM[i];
    const aS = gs(m.a), bS = gs(m.b);
    const aO = gst(m.a) === "cut" || gst(m.a) === "wd";
    const bO = gst(m.b) === "cut" || gst(m.b) === "wd";
    if (aO && bO) return { w: null, st: "dead" };
    if (aO) return { w: m.b, ws: bS, st: "decided" };
    if (bO) return { w: m.a, ws: aS, st: "decided" };
    if (aS === null && bS === null) return { w: null, st: "pre" };
    if (aS === null || bS === null) return { w: null, st: "partial" };
    if (aS < bS) return { w: m.a, ws: aS, st: "live" };
    if (bS < aS) return { w: m.b, ws: bS, st: "live" };
    return { w: null, st: "tied" };
  };

  /* ═══ ENTRY SCORING ═══ */
  const ce = entry => {
    let tot = 0, act = 0, pnd = 0, det = [];
    entry.p.forEach((pk, i) => {
      const r = mres(i);
      const pkO = gst(pk) === "cut" || gst(pk) === "wd";
      const sc = gs(pk);
      if (r.st === "pre" || r.st === "partial") { pnd++; det.push({ st: "pnd", sc }); }
      else if (r.st === "dead" || pkO) { det.push({ st: "out" }); }
      else if (r.w && mn(pk, r.w)) { tot += sc ?? 0; act++; det.push({ st: "act", sc }); }
      else if (r.st === "tied") { pnd++; det.push({ st: "tie", sc }); }
      else { det.push({ st: "los", sc }); }
    });
    return { tot, act, pnd, det };
  };

  /* ═══ LEADERBOARD WITH TIED RANKINGS ═══ */
  const lb = EE.map(e => ({
    ...e, ...ce(e),
    my: MY.some(m => m.toLowerCase() === e.t.toLowerCase())
  })).sort((a, b) => a.tot - b.tot || b.act - a.act);

  /* Compute tied ranks: entries at same score share the same rank with "T" prefix */
  const ranks = (() => {
    const r = [];
    let i = 0;
    while (i < lb.length) {
      let j = i;
      while (j < lb.length && lb[j].tot === lb[i].tot) j++;
      const count = j - i;
      const pos = i + 1;
      for (let k = i; k < j; k++) {
        r.push({ pos, tied: count > 1 });
      }
      i = j;
    }
    return r;
  })();

  /* Find the rank threshold for top-3 highlighting (include all tied for 3rd) */
  const top3Score = lb.length >= 3 ? lb[2].tot : null;

  const myR = lb.map((e, idx) => ({ ...e, rk: ranks[idx].pos, tied: ranks[idx].tied, idx }))
    .filter(e => e.my);

  const has = Object.keys(gd).length > 0;

  /* ═══ Thru display for matchup cards ═══ */
  const thruLabel = name => {
    const t = gthru(name);
    const r = ground(name);
    if (t === null || r === null) return null;
    return fmtThru(r, t);
  };

  return React.createElement("div", null,
    /* ═══ HEADER ═══ */
    React.createElement("div", { className: "hdr" },
      React.createElement("div", { className: "sub" }, "The 2026 Masters Tournament"),
      React.createElement("h1", null, "Augusta Command Center"),
      React.createElement("div", { className: "info" }, "53 entries \u00b7 10 matchups \u00b7 lowest combined score wins")
    ),

    /* ═══ CONTROLS ═══ */
    React.createElement("div", { className: "controls" },
      React.createElement("button", { className: "btn btn-gold", onClick: fetchS, disabled: loading },
        loading ? "\u23f3 Fetching..." : "\u26a1 Refresh Scores"),
      React.createElement("button", {
        className: "btn btn-outline" + (auto ? " active" : ""),
        onClick: () => setAuto(!auto)
      }, auto ? "\ud83d\udd04 Auto ON" : "Auto OFF"),
      React.createElement("button", {
        className: "btn btn-outline" + (manual ? " active" : ""),
        onClick: () => setManual(!manual)
      }, "\u270f\ufe0f Manual")
    ),

    /* ═══ SELECTED ENTRY BANNER ═══ */
    selE && React.createElement("div", { className: "selbanner" },
      React.createElement("span", { className: "seltxt" }, "Viewing: " + selE),
      React.createElement("button", { className: "selbtn", onClick: () => setSelE(null) }, "Clear")
    ),

    err && React.createElement("div", { className: "err" }, err),
    lastUp && React.createElement("div", { className: "updated" }, "Updated: " + new Date(lastUp).toLocaleTimeString()),

    /* ═══ MY 3 ENTRIES STATUS CARDS ═══ */
    has && myR.length > 0 && React.createElement("div", { className: "mycards" },
      myR.map(e => React.createElement("div", { key: e.t, className: "mycard" },
        React.createElement("div", { className: "name" }, e.t.split(" ").pop()),
        React.createElement("div", { className: "score " + (e.tot < 0 ? "neg" : e.tot > 0 ? "pos" : "even") }, fs(e.tot)),
        React.createElement("div", { className: "meta" },
          React.createElement("span", { className: "rank" }, (e.tied ? "T" : "") + e.rk),
          " \u00b7 ", React.createElement("span", null, e.act + " active"),
          e.pnd > 0 && React.createElement("span", { style: { color: "rgba(245,240,225,0.3)" } }, " \u00b7 " + e.pnd + " pnd")
        )
      ))
    ),

    /* ═══ MANUAL ENTRY PANEL ═══ */
    manual && React.createElement("div", { className: "manual" },
      React.createElement("div", { className: "title" }, "Manual Score Entry (score vs par, thru holes)"),
      React.createElement("div", { className: "mgrid" },
        MM.map(m => React.createElement("div", { key: m.n, className: "mentry" },
          React.createElement("span", { className: "ml" }, "M" + m.n),
          ...[m.a, m.b].map(name => {
            const st = gst(name), out = st !== "active";
            return React.createElement("div", { key: name, style: { display: "flex", alignItems: "center", gap: 2, flex: 1 } },
              React.createElement("select", { value: st, onChange: e => um(name, "st", e.target.value) },
                React.createElement("option", { value: "active" }, "OK"),
                React.createElement("option", { value: "cut" }, "MC"),
                React.createElement("option", { value: "wd" }, "WD")
              ),
              React.createElement("span", { className: "gn" + (out ? " out" : "") }, name.split(" ").pop()),
              React.createElement("input", { type: "number", value: gs(name) ?? "", onChange: e => um(name, "s", e.target.value), disabled: out, placeholder: "\u2014" }),
              React.createElement("input", { className: "thru", value: gthru(name) ?? "", onChange: e => um(name, "thru", e.target.value), disabled: out, placeholder: "t" })
            );
          })
        ))
      )
    ),

    /* ═══ 10 MATCHUP CARDS ═══ */
    React.createElement("div", { className: "matchups" },
      MM.map((m, i) => {
        const r = mres(i), fp = FP[i];
        const dec = r.st === "decided", dead = r.st === "dead";
        return React.createElement("div", {
          key: m.n,
          className: "mcard" + (dec ? " decided" : "") + (dead ? " dead" : "")
        },
          React.createElement("div", { className: "mhdr" },
            React.createElement("span", { className: "mnum" }, "M" + m.n),
            dec && React.createElement("span", { className: "mst", style: { color: "var(--green)" } }, "DECIDED"),
            dead && React.createElement("span", { className: "mst", style: { color: "var(--red)" } }, "BOTH OUT"),
            r.st === "live" && React.createElement("span", { className: "mst", style: { color: "var(--gold)" } }, "LIVE"),
            r.st === "tied" && React.createElement("span", { className: "mst", style: { color: "var(--gold)" } }, "TIED")
          ),
          [{ nm: m.a, pct: fp.a }, { nm: m.b, pct: fp.b }].map(({ nm, pct }) => {
            const isPicked = selE && (() => {
              const se = EE.find(e => e.t === selE);
              return se && mn(se.p[i], nm);
            })();
            const sc = gs(nm), tl = thruLabel(nm), isW = r.w && mn(nm, r.w);
            const out = gst(nm) === "cut" || gst(nm) === "wd";
            return React.createElement("div", {
              key: nm,
              className: "mrow" + (isW ? " winner" : "") + (isPicked ? " picked" : ""),
              style: { opacity: out ? 0.3 : (!isW && dec) ? 0.4 : 1 }
            },
              React.createElement("div", { style: { display: "flex", alignItems: "center", gap: 3, minWidth: 0 } },
                isW && React.createElement("span", { style: { fontSize: 7, color: "var(--green)" } }, "\u2713"),
                React.createElement("span", {
                  className: "pname" + (isW ? " w" : ""),
                  style: { color: out ? "rgba(245,240,225,0.3)" : undefined }
                }, nm.split(" ").pop() + (out ? " " + gst(nm).toUpperCase() : ""))
              ),
              React.createElement("div", { className: "pright" },
                sc !== null && !out && React.createElement("span", {
                  className: "pscore " + (sc < 0 ? "neg" : sc > 0 ? "pos" : "even")
                }, fs(sc)),
                tl && !out && React.createElement("span", { className: "pthru" }, tl),
                React.createElement("span", { className: "ppct" }, pct + "%")
              )
            );
          })
        );
      })
    ),

    /* ═══ FULL 53-ENTRY LEADERBOARD ═══ */
    React.createElement("div", {
      style: { background: "rgba(0,0,0,0.25)", border: "1px solid rgba(245,240,225,0.06)", borderRadius: 7, overflow: "hidden" }
    },
      React.createElement("div", { style: { overflowX: "auto" } },
        React.createElement("table", null,
          React.createElement("thead", null,
            React.createElement("tr", null,
              React.createElement("th", { style: { width: 28 } }, "#"),
              React.createElement("th", { className: "team" }, "TEAM"),
              React.createElement("th", { className: "sc", style: { width: 46 } }, "SCORE"),
              React.createElement("th", { style: { width: 28 } }, "A"),
              ...MM.map(m => React.createElement("th", { key: m.n, style: { width: 30, fontSize: 8 } }, "M" + m.n))
            )
          ),
          React.createElement("tbody", null,
            lb.map((e, idx) => {
              const rk = ranks[idx];
              const isTop3 = top3Score !== null && e.tot <= top3Score;
              const rkLabel = (rk.tied ? "T" : "") + rk.pos;
              return React.createElement("tr", {
                key: e.t,
                onClick: () => setSelE(selE === e.t ? null : e.t),
                className: (e.my ? "mine" : "") + (isTop3 ? " top3" : "") + (selE === e.t ? " sel" : "")
              },
                React.createElement("td", { className: "rk" + (isTop3 ? " top3" : "") }, rkLabel),
                React.createElement("td", { className: "tn" + (e.my ? " mine" : "") }, e.my ? "\u2b50 " + e.t : e.t),
                React.createElement("td", { className: "sc " + (e.tot < 0 ? "neg" : e.tot > 0 ? "pos" : "even") }, has ? fs(e.tot) : "\u2014"),
                React.createElement("td", { className: "act" }, has ? e.act : "\u2014"),
                ...e.det.map((d, di) => React.createElement("td", { key: di, className: "cell" },
                  d.st === "act" ? React.createElement("span", {
                    className: (d.sc < 0 ? "neg" : d.sc > 0 ? "pos" : "even"),
                    style: { fontFamily: "'JetBrains Mono',monospace", fontWeight: 600 }
                  }, fs(d.sc))
                  : d.st === "los" && d.sc !== null ? React.createElement("span", {
                    style: { color: "var(--red)", opacity: 0.4, fontSize: 8, fontFamily: "'JetBrains Mono',monospace" }
                  }, fs(d.sc))
                  : d.st === "tie" ? React.createElement("span", { style: { color: "var(--gold)" } }, "=")
                  : d.st === "pnd" ? React.createElement("span", { style: { color: "rgba(245,240,225,0.2)" } }, "\u23f3")
                  : React.createElement("span", { style: { color: "rgba(245,240,225,0.1)" } }, "\u00b7")
                ))
              );
            })
          )
        )
      )
    ),

    /* ═══ LEGEND ═══ */
    React.createElement("div", { className: "legend" },
      React.createElement("span", null, React.createElement("span", { className: "neg" }, "-5"), " Activated"),
      React.createElement("span", null, React.createElement("span", { style: { color: "var(--red)", opacity: 0.4 } }, "+2"), " Losing"),
      React.createElement("span", null, "\u23f3 Pending"),
      React.createElement("span", null, "\u00b7 Out"),
      React.createElement("span", null, "\u2b50 Yours")
    ),
    React.createElement("div", { className: "foot" }, "Augusta Command Center \u00b7 DataGolf Live Data \u00b7 kcdc29.github.io/masters-tracker")
  );
}

ReactDOM.createRoot(document.getElementById("app")).render(React.createElement(App));
</script>
</body>
</html>
