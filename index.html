<title>Augusta Command Center — Masters H2H Tracker</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a3d1a;--bg2:#0d4a20;--gold:#C5A55A;--cream:#f5f0e1;--green:#4ade80;--red:#f87171;--dim:rgba(245,240,225,0.35)}
body{font-family:'DM Sans','Segoe UI',sans-serif;background:linear-gradient(180deg,var(--bg),var(--bg2));min-height:100vh;color:var(--cream);-webkit-font-smoothing:antialiased}
.wrap{max-width:1100px;margin:0 auto;padding:12px 14px 40px}
.hdr{text-align:center;padding:8px 0 14px;border-bottom:1px solid rgba(197,165,90,0.25)}
.hdr .sub{font-size:10px;letter-spacing:4px;color:var(--gold);text-transform:uppercase;margin-bottom:2px}
.hdr h1{font-family:'Playfair Display',Georgia,serif;font-size:24px;font-weight:800;letter-spacing:-0.5px;color:#fff;margin:2px 0}
.hdr .info{font-size:11px;color:rgba(245,240,225,0.5)}
.controls{display:flex;justify-content:center;gap:6px;margin:12px 0;flex-wrap:wrap}
.btn{padding:7px 16px;font-size:12px;font-family:'DM Sans',sans-serif;font-weight:600;border:none;border-radius:5px;cursor:pointer;transition:all 0.2s}
.btn-gold{background:linear-gradient(135deg,var(--gold),#D4AF37);color:var(--bg);box-shadow:0 2px 8px rgba(197,165,90,0.3)}
.btn-gold:disabled{background:#555;cursor:wait;box-shadow:none}
.btn-outline{background:transparent;color:var(--dim);border:1px solid rgba(245,240,225,0.15)}
.btn-outline.active{background:rgba(197,165,90,0.15);color:var(--gold);border-color:var(--gold)}
.err{background:rgba(220,38,38,0.12);border:1px solid rgba(220,38,38,0.25);border-radius:5px;padding:6px 10px;font-size:11px;color:#fca5a5;text-align:center;margin-bottom:10px}
.updated{text-align:center;font-size:9px;color:rgba(245,240,225,0.3);margin-bottom:10px}
.mycards{display:grid;gap:6px;margin-bottom:14px}
.mycard{background:linear-gradient(135deg,rgba(197,165,90,0.12),rgba(197,165,90,0.04));border:1px solid rgba(197,165,90,0.25);border-radius:8px;padding:8px 10px;text-align:center}
.mycard .name{font-size:9px;color:var(--gold);letter-spacing:1px;text-transform:uppercase;font-weight:600}
.mycard .score{font-family:'Playfair Display',serif;font-size:28px;font-weight:800;margin:2px 0}
.mycard .meta{font-size:11px}
.mycard .rank{color:var(--gold);font-weight:700}
.matchups{display:grid;grid-template-columns:repeat(5,1fr);gap:5px;margin-bottom:14px}
@media(max-width:700px){.matchups{grid-template-columns:repeat(2,1fr)}.mycards{grid-template-columns:repeat(3,1fr)}}
@media(min-width:701px){.mycards{grid-template-columns:repeat(3,1fr)}}
.mcard{background:rgba(0,0,0,0.2);border:1px solid rgba(245,240,225,0.06);border-radius:7px;padding:6px 7px;transition:all 0.3s}
.mcard.decided{background:rgba(74,222,128,0.06);border-color:rgba(74,222,128,0.3)}
.mcard.dead{border-color:rgba(248,113,113,0.2)}
.mcard .mhdr{display:flex;justify-content:space-between;margin-bottom:4px}
.mcard .mnum{font-size:8px;font-weight:700;color:rgba(245,240,225,0.25)}
.mcard .mst{font-size:7px;font-weight:700;letter-spacing:0.5px}
.mrow{display:flex;justify-content:space-between;align-items:center;padding:2px 3px;border-radius:3px;margin-bottom:1px}
.mrow.winner{background:rgba(74,222,128,0.1)}
.mrow.picked{background:rgba(197,165,90,0.18);border-left:2px solid #C5A55A}
.mrow.picked.winner{background:linear-gradient(90deg,rgba(197,165,90,0.18),rgba(74,222,128,0.1))}
.mrow .pname{font-size:10px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mrow .pname.w{font-weight:700;color:var(--green)}
.mrow .pright{display:flex;align-items:center;gap:3px;flex-shrink:0}
.mrow .pscore{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:600}
.mrow .pthru{font-size:7px;color:rgba(245,240,225,0.3)}
.mrow .ppct{font-size:7px;color:rgba(245,240,225,0.15);width:18px;text-align:right}
.neg{color:var(--green)}.pos{color:var(--red)}.even{color:var(--cream)}
table{width:100%;border-collapse:collapse;font-size:10px}
thead tr{background:rgba(0,0,0,0.3)}
th{padding:7px 4px;color:rgba(245,240,225,0.4);font-weight:600;font-size:9px;text-align:center}
th.team{text-align:left}

tbody tr{border-bottom:1px solid rgba(245,240,225,0.03);transition:background 0.15s}
tbody tr.mine{background:rgba(197,165,90,0.08)}
tbody tr.top3{background:rgba(74,222,128,0.02)}
tbody tr.sel{background:rgba(197,165,90,0.15)!important;outline:1px solid rgba(197,165,90,0.4)}
tbody tr{cursor:pointer}
td{padding:5px 3px;text-align:center;font-size:10px}
td.rk{font-family:'JetBrains Mono',monospace;color:rgba(245,240,225,0.3)}

td.tn{text-align:left;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:140px}
td.tn.mine{font-weight:700;color:var(--gold)}
td.sc{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:12px}
td.act{font-family:'JetBrains Mono',monospace;color:rgba(245,240,225,0.4)}
td.cell{font-size:9px;padding:3px 1px}
.manual{background:rgba(0,0,0,0.2);border:1px solid rgba(245,240,225,0.08);border-radius:7px;padding:10px;margin-bottom:12px}
.manual .title{font-size:11px;font-weight:600;color:var(--gold);margin-bottom:6px}
.mgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:4px}
.mentry{display:flex;gap:4px;align-items:center;font-size:10px}
.mentry .ml{width:26px;color:rgba(245,240,225,0.35);font-weight:600}
.mentry select{width:40px;font-size:9px;padding:1px;background:var(--bg2);color:var(--cream);border:1px solid rgba(245,240,225,0.12);border-radius:3px}
.mentry .gn{width:60px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:10px}
.mentry .gn.out{color:rgba(245,240,225,0.25)}
.mentry input{width:36px;padding:1px 2px;font-size:10px;background:var(--bg2);color:var(--cream);border:1px solid rgba(245,240,225,0.12);border-radius:3px;text-align:center;font-family:'JetBrains Mono',monospace}

.legend{display:flex;justify-content:center;gap:12px;margin-top:8px;font-size:9px;color:rgba(245,240,225,0.25);flex-wrap:wrap}
.foot{text-align:center;margin-top:10px;font-size:8px;color:rgba(245,240,225,0.15)}
.spin{display:inline-block;animation:spin 1s linear infinite}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}

const nr=n=>n.normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/[^a-zA-Z]/g,"").toLowerCase();
const fs=s=>s===0?"E":s>0?"+"+s:""+s;
const mn=(a,b)=>{const x=nr(a),y=nr(b);if(x===y)return true;const la=nr(a.split(" ").pop()),lb=nr(b.split(" ").pop());return la===lb;};
const FP=MM.map((_,i)=>{const ac=EE.filter(e=>mn(e.p[i],MM[i].a)).length;return{a:Math.round(ac/EE.length*100),b:Math.round((EE.length-ac)/EE.length*100)};});

const ESPN_URL="https://site.api.espn.com/apis/site/v2/sports/golf/pga/scoreboard";

function App(){
  const[gd,setGd]=useState({});
  const[selE,setSelE]=useState(null);
  const[loading,setLoading]=useState(false);
  const[lastUp,setLastUp]=useState(null);
  const[err,setErr]=useState(null);
  const[auto,setAuto]=useState(false);
  const[manual,setManual]=useState(false);
  const iv=useRef(null);

  useEffect(()=>{const s=localStorage.getItem("mh2h4");if(s){try{const d=JSON.parse(s);if(d.gd)setGd(d.gd);if(d.lu)setLastUp(d.lu);}catch(e){}};},[]);
  useEffect(()=>{if(Object.keys(gd).length>0)localStorage.setItem("mh2h4",JSON.stringify({gd,lu:lastUp}));},[gd,lastUp]);
  useEffect(()=>{if(auto){iv.current=setInterval(fetchS,300000);return()=>clearInterval(iv.current);}else if(iv.current)clearInterval(iv.current);},[auto]);

  const fetchS=useCallback(async()=>{
    setLoading(true);setErr(null);
    try{
      const r=await fetch(ESPN_URL);
      const data=await r.json();
      const ev=data.events?.[0];
      if(!ev){setErr("No active event found on ESPN.");setLoading(false);return;}
      const comps=ev.competitions?.[0]?.competitors||[];
      const nd={};
      comps.forEach(c=>{
        const name=c.athlete?.displayName||"";
        const found=NAMES.find(n=>mn(name,n));
        if(!found)return;
        const scoreStr=c.score;
        let score=0;
        if(scoreStr==="E"||scoreStr==="0")score=0;
        else if(typeof scoreStr==="string")score=parseInt(scoreStr)||0;
        else if(typeof scoreStr==="number")score=scoreStr;
        const status=c.status||{};
        const thru=status.displayValue||status.thru||"";
        const cut=status.type?.description||"";
        let st="active";
        if(cut.toLowerCase().includes("cut"))st="cut";
        else if(cut.toLowerCase().includes("wd")||cut.toLowerCase().includes("withdraw"))st="wd";
        nd[nr(found)]={s:score,t:thru,st};
      });
      if(Object.keys(nd).length>=8){setGd(nd);setLastUp(new Date().toISOString());}
      else setErr(`Found ${Object.keys(nd).length}/20. ESPN may not have all scores yet.`);
    }catch(e){setErr("ESPN fetch failed: "+e.message);}
    setLoading(false);
  },[]);

  const gg=n=>gd[nr(n)]||null;
  const gs=n=>gg(n)?.s??null;
  const gt=n=>gg(n)?.t??"";
  const gst=n=>gg(n)?.st??"active";
  const um=(n,f,v)=>setGd(p=>({...p,[nr(n)]:{...(p[nr(n)]||{s:0,t:"",st:"active"}),[f]:f==="s"?(v===""?0:parseInt(v)):v}}));

  const mres=i=>{
    const m=MM[i],aS=gs(m.a),bS=gs(m.b),aO=gst(m.a)==="cut"||gst(m.a)==="wd",bO=gst(m.b)==="cut"||gst(m.b)==="wd";
    if(aO&&bO)return{w:null,st:"dead"};
    if(aO)return{w:m.b,ws:bS,st:"decided"};
